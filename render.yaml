services:
  - type: web
    name: jotun-billing-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: PUBLIC_INVOICE_LINK_DAYS
        value: "30"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: AUTO_BACKUP_ENABLED
        value: "true"
      - key: AUTO_BACKUP_TIME
        value: "02:00"
      - key: AUTO_BACKUP_RETENTION_DAYS
        value: "30"
